server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — every unknown path serves index.html so React Router
  # handles it client-side.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache hashed assets; short-cache HTML.
  location ~* \.(?:css|js|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
    expires 30d;
    access_log off;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }
  location = /index.html {
    add_header Cache-Control "no-store";
  }
}
