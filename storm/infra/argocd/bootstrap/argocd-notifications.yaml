# ArgoCD notifications: page #storm-oncall on sync failure / app degraded,
# notify #storm-deploys on every successful sync.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  service.slack: |
    token: $slack-token
  template.app-sync-failed: |
    message: |
      {{if eq .serviceType "slack"}}:warning:{{end}} *{{.app.metadata.name}}* sync FAILED.
      Project: {{.app.spec.project}}
      Revision: {{.app.status.sync.revision}}
      Error: {{(call .repo.GetCommitMetadata .app.status.sync.revision).Message}}
      <{{.context.argocdUrl}}/applications/{{.app.metadata.name}}|Open in ArgoCD>
    slack:
      attachments: |
        [{
          "title": "{{ .app.metadata.name}} sync failed",
          "color": "#E96D76",
          "fields": [
            { "title": "Status", "value": "{{.app.status.operationState.phase}}", "short": true },
            { "title": "Health", "value": "{{.app.status.health.status}}",         "short": true }
          ]
        }]
  template.app-degraded: |
    message: |
      :rotating_light: *{{.app.metadata.name}}* is DEGRADED.
      <{{.context.argocdUrl}}/applications/{{.app.metadata.name}}|Open in ArgoCD>
  template.app-sync-succeeded: |
    message: |
      :white_check_mark: *{{.app.metadata.name}}* synced to {{.app.status.sync.revision | substr 0 7}}.

  trigger.on-sync-failed: |
    - description: Application sync failed
      send: [app-sync-failed]
      when: app.status.operationState.phase in ['Error', 'Failed']
  trigger.on-degraded: |
    - description: Application is in degraded state
      send: [app-degraded]
      when: app.status.health.status == 'Degraded'
  trigger.on-sync-succeeded: |
    - description: Application synced successfully
      send: [app-sync-succeeded]
      when: app.status.operationState.phase in ['Succeeded']

  subscriptions: |
    - recipients: ["slack:storm-oncall"]
      triggers:  ["on-sync-failed", "on-degraded"]
    - recipients: ["slack:storm-deploys"]
      triggers:  ["on-sync-succeeded"]
---
# The `slack-token` value is populated out-of-band into this secret
# (see INFRA-SETUP.md §9).
apiVersion: v1
kind: Secret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
type: Opaque
stringData:
  slack-token: ""
