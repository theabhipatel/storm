apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: 6.13.0
      helm:
        valueFiles:
          - $values/storm/infra/k8s/observability/loki-values.yaml
    - repoURL: https://github.com/storm/storm.git
      targetRevision: main
      ref: values
  destination:
    name: in-cluster
    namespace: observability
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: ["CreateNamespace=true", "ServerSideApply=true"]
