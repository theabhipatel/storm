apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/storm/storm.git
    targetRevision: main
    path: storm/infra/k8s/observability
    kustomize: {}
  destination:
    name: in-cluster
    namespace: observability
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: ["CreateNamespace=true", "ServerSideApply=true"]
