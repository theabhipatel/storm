apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: catalog
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/storm/storm.git
    targetRevision: main
    path: storm/infra/argocd/dev/services/catalog
  destination:
    name: in-cluster
    namespace: storm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions: ["CreateNamespace=true", "ServerSideApply=true"]
