apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: storm
  labels:
    app: notification
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: notification
      annotations:
        linkerd.io/inject: enabled
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3009"
    spec:
      serviceAccountName: notification
      containers:
        - name: app
          # Image tag is bumped by the CD workflow on each merge to main.
          image: 000000000000.dkr.ecr.ap-south-1.amazonaws.com/storm/notification:replace-me
          ports:
            - { name: http, containerPort: 3009 }
          env:
            - { name: NODE_ENV,                   value: production }
            - { name: PORT,                       value: "3009" }
            - { name: SERVICE_VERSION,            valueFrom: { fieldRef: { fieldPath: metadata.labels['app.kubernetes.io/version'] } } }
            - { name: DEPLOYMENT_ENVIRONMENT,     value: dev }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT,value: http://otel-collector.observability.svc.cluster.local:4318 }
          envFrom:
            - secretRef: { name: notification-secrets }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 1,    memory: 1Gi }
          readinessProbe:
            httpGet: { path: /ready,  port: 3009 }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 3009 }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification
  namespace: storm
spec:
  selector:
    app: notification
  ports:
    - { name: http, port: 3009, targetPort: 3009 }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notification
  namespace: storm
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: notification-secrets
  namespace: storm
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: notification-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: storm/dev/notification
