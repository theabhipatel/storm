apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: storm
  labels: { app: admin }
spec:
  replicas: 2
  selector: { matchLabels: { app: admin } }
  template:
    metadata:
      labels: { app: admin }
      annotations:
        linkerd.io/inject: enabled
    spec:
      containers:
        - name: app
          image: 000000000000.dkr.ecr.ap-south-1.amazonaws.com/storm/admin:replace-me
          ports: [{ name: http, containerPort: 80 }]
          resources:
            requests: { cpu: 50m,  memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          readinessProbe: { httpGet: { path: /, port: 80 }, periodSeconds: 5 }
---
apiVersion: v1
kind: Service
metadata: { name: admin, namespace: storm }
spec:
  selector: { app: admin }
  ports: [{ name: http, port: 80, targetPort: 80 }]
