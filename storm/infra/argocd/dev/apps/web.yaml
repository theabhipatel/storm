apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: storm
  labels: { app: web }
spec:
  replicas: 3
  selector: { matchLabels: { app: web } }
  template:
    metadata:
      labels: { app: web }
      annotations:
        linkerd.io/inject: enabled
    spec:
      containers:
        - name: app
          image: 000000000000.dkr.ecr.ap-south-1.amazonaws.com/storm/web:replace-me
          ports: [{ name: http, containerPort: 3200 }]
          env:
            - { name: NODE_ENV, value: production }
            - { name: PORT,     value: "3200" }
          envFrom:
            - secretRef: { name: web-secrets }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 1,    memory: 1Gi }
          readinessProbe: { httpGet: { path: /, port: 3200 }, periodSeconds: 5 }
---
apiVersion: v1
kind: Service
metadata: { name: web, namespace: storm }
spec:
  selector: { app: web }
  ports: [{ name: http, port: 3200, targetPort: 3200 }]
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata: { name: web-secrets, namespace: storm }
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secrets-manager, kind: ClusterSecretStore }
  target: { name: web-secrets, creationPolicy: Owner }
  dataFrom: [{ extract: { key: storm/dev/web } }]
