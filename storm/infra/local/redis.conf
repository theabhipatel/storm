# Redis 7 — local dev config
# Persistence: both AOF (every-sec fsync) and RDB snapshots.

# RDB snapshots
save 900 1
save 300 10
save 60 10000

# AOF
appendonly yes
appendfsync everysec

# Sensible memory caps for local dev
maxmemory 256mb
maxmemory-policy allkeys-lru

# Disable protected mode (local only — never in prod)
protected-mode no
bind 0.0.0.0
