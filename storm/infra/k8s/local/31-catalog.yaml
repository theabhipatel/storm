apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  namespace: storm-local
spec:
  replicas: 1
  selector:
    matchLabels: { app: catalog }
  template:
    metadata:
      labels: { app: catalog }
    spec:
      containers:
        - name: app
          image: storm/catalog:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: storm-common }
          env:
            - { name: PORT, value: "3002" }
            - { name: DATABASE_URL, value: "postgresql://catalog:catalog_pw@postgres:5432/catalog?schema=public" }
          ports:
            - { containerPort: 3002 }
          readinessProbe:
            tcpSocket: { port: 3002 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3002 }
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: catalog
  namespace: storm-local
spec:
  selector: { app: catalog }
  ports:
    - { port: 3002, targetPort: 3002 }
