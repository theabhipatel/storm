apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation
  namespace: storm-local
spec:
  replicas: 1
  selector:
    matchLabels: { app: recommendation }
  template:
    metadata:
      labels: { app: recommendation }
    spec:
      containers:
        - name: app
          image: storm/recommendation:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: storm-common }
          env:
            - { name: PORT, value: "3009" }
            - { name: CATALOG_BASE_URL,   value: http://catalog:3002 }
            - { name: SEARCH_BASE_URL,    value: http://search:3003 }
            - { name: INVENTORY_BASE_URL, value: http://inventory:3004 }
          ports:
            - { containerPort: 3009 }
          readinessProbe:
            tcpSocket: { port: 3009 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3009 }
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: recommendation
  namespace: storm-local
spec:
  selector: { app: recommendation }
  ports:
    - { port: 3009, targetPort: 3009 }
