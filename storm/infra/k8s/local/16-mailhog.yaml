# MailHog — captures the emails notification-service sends. SMTP on 1025, web UI
# on 8025 (port-forward to read messages).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: storm-local
spec:
  replicas: 1
  selector:
    matchLabels: { app: mailhog }
  template:
    metadata:
      labels: { app: mailhog }
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog:v1.0.1
          ports:
            - { containerPort: 1025 }
            - { containerPort: 8025 }
---
apiVersion: v1
kind: Service
metadata:
  name: mailhog
  namespace: storm-local
spec:
  selector: { app: mailhog }
  ports:
    - { name: smtp, port: 1025, targetPort: 1025 }
    - { name: ui,   port: 8025, targetPort: 8025 }
