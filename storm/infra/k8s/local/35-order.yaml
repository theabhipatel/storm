apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
  namespace: storm-local
spec:
  replicas: 1
  selector:
    matchLabels: { app: order }
  template:
    metadata:
      labels: { app: order }
    spec:
      containers:
        - name: app
          image: storm/order:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: storm-common }
          env:
            - { name: PORT, value: "3006" }
            - { name: DATABASE_URL, value: "postgresql://order:order_pw@postgres:5432/order?schema=public" }
            - { name: CART_BASE_URL,         value: http://cart:3005 }
            - { name: IDENTITY_BASE_URL,     value: http://identity:3001 }
            - { name: INVENTORY_BASE_URL,    value: http://inventory:3004 }
            - { name: PAYMENT_BASE_URL,      value: http://payment:3007 }
            - { name: NOTIFICATION_BASE_URL, value: http://notification:3010 }
            - { name: INVENTORY_GRPC_ADDRESS, value: inventory:50051 }
          ports:
            - { containerPort: 3006 }
          readinessProbe:
            tcpSocket: { port: 3006 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3006 }
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: order
  namespace: storm-local
spec:
  selector: { app: order }
  ports:
    - { port: 3006, targetPort: 3006 }
