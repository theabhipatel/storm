# Redis 7 — AOF + RDB persistence (cart is Redis-only). Config matches the
# docker-compose redis.conf.
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-conf
  namespace: storm-local
data:
  redis.conf: |
    save 900 1
    save 300 10
    save 60 10000
    appendonly yes
    appendfsync everysec
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    protected-mode no
    bind 0.0.0.0
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: storm-local
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: storm-local
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: conf, mountPath: /usr/local/etc/redis }
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: redis-data }
        - name: conf
          configMap: { name: redis-conf }
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: storm-local
spec:
  selector: { app: redis }
  ports:
    - { port: 6379, targetPort: 6379 }
