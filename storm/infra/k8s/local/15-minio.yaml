# MinIO — S3-compatible store for media-service. A one-shot Job creates the
# public-read `storm-media` bucket once MinIO is up.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: storm-local
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: storm-local
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: minio }
  template:
    metadata:
      labels: { app: minio }
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-09-22T00-33-43Z
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - { name: MINIO_ROOT_USER,     value: minio }
            - { name: MINIO_ROOT_PASSWORD, value: minio12345 }
          ports:
            - { containerPort: 9000 }
            - { containerPort: 9001 }
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /minio/health/live, port: 9000 }
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: minio-data }
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: storm-local
spec:
  selector: { app: minio }
  ports:
    - { name: api,     port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: storm-local
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2024-09-16T17-43-14Z
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until mc alias set local http://minio:9000 minio minio12345; do
                echo "waiting for minio..."; sleep 3
              done
              mc mb --ignore-existing local/storm-media
              mc anonymous set download local/storm-media
              echo "minio bucket ready"
