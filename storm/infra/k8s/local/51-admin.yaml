# React/Vite admin SPA served by nginx on port 80. Its API base URLs
# (admin-bff:3100, identity:3001, kong:8000) are baked at image BUILD time, so
# up.sh builds it with localhost:* args and port-forwards those ports.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: storm-local
spec:
  replicas: 1
  selector:
    matchLabels: { app: admin }
  template:
    metadata:
      labels: { app: admin }
    spec:
      containers:
        - name: app
          image: storm/admin:local
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 80 }
          readinessProbe:
            tcpSocket: { port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 80 }
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: storm-local
spec:
  selector: { app: admin }
  ports:
    - { port: 80, targetPort: 80 }
