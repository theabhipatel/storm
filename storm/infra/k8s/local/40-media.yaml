apiVersion: apps/v1
kind: Deployment
metadata:
  name: media
  namespace: storm-local
spec:
  replicas: 1
  selector:
    matchLabels: { app: media }
  template:
    metadata:
      labels: { app: media }
    spec:
      containers:
        - name: app
          image: storm/media:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: storm-common }
          env:
            - { name: PORT, value: "3011" }
            - { name: DATABASE_URL, value: "postgresql://media:media_pw@postgres:5432/media?schema=public" }
            - { name: S3_ENDPOINT,   value: http://minio:9000 }
            - { name: S3_REGION,     value: us-east-1 }
            - { name: S3_BUCKET,     value: storm-media }
            - { name: S3_ACCESS_KEY, value: minio }
            - { name: S3_SECRET_KEY, value: minio12345 }
            - { name: S3_FORCE_PATH_STYLE, value: "true" }
            # Browser fetches media via the port-forwarded MinIO on localhost:9000.
            - { name: CDN_BASE_URL,  value: http://localhost:9000/storm-media }
          ports:
            - { containerPort: 3011 }
          readinessProbe:
            tcpSocket: { port: 3011 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3011 }
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: media
  namespace: storm-local
spec:
  selector: { app: media }
  ports:
    - { port: 3011, targetPort: 3011 }
