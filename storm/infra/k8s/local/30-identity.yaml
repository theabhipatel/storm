apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  namespace: storm-local
spec:
  replicas: 1
  selector:
    matchLabels: { app: identity }
  template:
    metadata:
      labels: { app: identity }
    spec:
      containers:
        - name: app
          image: storm/identity:local
          imagePullPolicy: IfNotPresent
          # Load the RSA keys from the mounted Secret into env, then start.
          command:
            - sh
            - -c
            - |
              export JWT_PRIVATE_KEY="$(cat /keys/jwt.key)"
              export JWT_PUBLIC_KEY="$(cat /keys/jwt.pub)"
              export JWT_KID="$(cat /keys/jwt.kid)"
              exec node dist/index.js
          envFrom:
            - configMapRef: { name: storm-common }
          env:
            - { name: PORT, value: "3001" }
            - { name: DATABASE_URL, value: "postgresql://identity:identity_pw@postgres:5432/identity?schema=public" }
            - { name: JWT_PRIVATE_KEY_FILE, value: /keys/jwt.key }
            - { name: JWT_PUBLIC_KEY_FILE,  value: /keys/jwt.pub }
            - { name: JWT_KID_FILE,         value: /keys/jwt.kid }
            - { name: WEB_APP_ORIGIN,   value: http://localhost:3200 }
            - { name: ADMIN_APP_ORIGIN, value: http://localhost:3300 }
            - { name: ALLOWED_ORIGINS,  value: "http://localhost:3200,http://localhost:3300" }
          ports:
            - { containerPort: 3001 }
          volumeMounts:
            - { name: jwt-keys, mountPath: /keys, readOnly: true }
          readinessProbe:
            tcpSocket: { port: 3001 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3001 }
            initialDelaySeconds: 20
            periodSeconds: 15
      volumes:
        - name: jwt-keys
          secret: { secretName: jwt-keys }
---
apiVersion: v1
kind: Service
metadata:
  name: identity
  namespace: storm-local
spec:
  selector: { app: identity }
  ports:
    - { port: 3001, targetPort: 3001 }
