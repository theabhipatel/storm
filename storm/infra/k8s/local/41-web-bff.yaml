apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-bff
  namespace: storm-local
spec:
  replicas: 1
  selector:
    matchLabels: { app: web-bff }
  template:
    metadata:
      labels: { app: web-bff }
    spec:
      containers:
        - name: app
          image: storm/web-bff:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: storm-common }
          env:
            - { name: PORT, value: "3000" }
            - { name: CATALOG_BASE_URL,        value: http://catalog:3002 }
            - { name: MEDIA_BASE_URL,          value: http://media:3011 }
            - { name: SEARCH_BASE_URL,         value: http://search:3003 }
            - { name: CART_BASE_URL,           value: http://cart:3005 }
            - { name: WISHLIST_BASE_URL,       value: http://wishlist:3008 }
            - { name: RECOMMENDATION_BASE_URL, value: http://recommendation:3009 }
            - { name: INVENTORY_BASE_URL,      value: http://inventory:3004 }
            - { name: ORDER_BASE_URL,          value: http://order:3006 }
            - { name: NOTIFICATION_BASE_URL,   value: http://notification:3010 }
            - { name: KAFKA_CLIENT_ID,         value: web-bff }
            - { name: ALLOWED_ORIGINS,         value: http://localhost:3200 }
          ports:
            - { containerPort: 3000 }
          readinessProbe:
            tcpSocket: { port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3000 }
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: web-bff
  namespace: storm-local
spec:
  selector: { app: web-bff }
  ports:
    - { port: 3000, targetPort: 3000 }
