apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: storm-local
spec:
  replicas: 1
  selector:
    matchLabels: { app: payment }
  template:
    metadata:
      labels: { app: payment }
    spec:
      containers:
        - name: app
          image: storm/payment:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: storm-common }
          env:
            - { name: PORT, value: "3007" }
            - { name: DATABASE_URL, value: "postgresql://payment:payment_pw@postgres:5432/payment?schema=public" }
            # Replace with real Razorpay test keys for checkout to work end to end.
            - { name: RAZORPAY_KEY_ID,         value: rzp_test_placeholder }
            - { name: RAZORPAY_KEY_SECRET,     value: placeholder }
            - { name: RAZORPAY_WEBHOOK_SECRET, value: placeholder }
          ports:
            - { containerPort: 3007 }
          readinessProbe:
            tcpSocket: { port: 3007 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3007 }
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: storm-local
spec:
  selector: { app: payment }
  ports:
    - { port: 3007, targetPort: 3007 }
