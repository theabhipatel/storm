# MongoDB 7 — used by notification-service. root/root; the init script creates a
# notification db + user (matches docker-compose mongo-init.js).
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongo-init
  namespace: storm-local
data:
  mongo-init.js: |
    db = db.getSiblingDB("notification");
    db.createUser({
      user: "notification",
      pwd: "notification_pw",
      roles: [{ role: "readWrite", db: "notification" }],
    });
    db.createCollection("messages");
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-data
  namespace: storm-local
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: storm-local
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: mongodb }
  template:
    metadata:
      labels: { app: mongodb }
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          env:
            - { name: MONGO_INITDB_ROOT_USERNAME, value: root }
            - { name: MONGO_INITDB_ROOT_PASSWORD, value: root }
          ports:
            - containerPort: 27017
          volumeMounts:
            - { name: data, mountPath: /data/db }
            - { name: init, mountPath: /docker-entrypoint-initdb.d }
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: mongo-data }
        - name: init
          configMap: { name: mongo-init }
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: storm-local
spec:
  selector: { app: mongodb }
  ports:
    - { port: 27017, targetPort: 27017 }
