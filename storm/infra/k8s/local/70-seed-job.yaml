# Optional dev seed: products, categories, brands, users, demo cart/orders.
# Run AFTER the services are up (it calls catalog/inventory/identity/media over
# HTTP). Skips silently if the demo user already exists.
#
# Re-run with:  kubectl -n storm-local delete job seed --ignore-not-found && kubectl apply -f 70-seed-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: seed
  namespace: storm-local
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: storm/seed:local
          imagePullPolicy: IfNotPresent
          env:
            - { name: PG_HOST,        value: postgres }
            - { name: PG_PORT,        value: "5432" }
            - { name: REDIS_URL,      value: redis://redis:6379 }
            - { name: CATALOG_BASE,   value: http://catalog:3002 }
            - { name: INVENTORY_BASE, value: http://inventory:3004 }
            - { name: IDENTITY_BASE,  value: http://identity:3001 }
            - { name: MEDIA_BASE,     value: http://media:3011 }
            - { name: S3_ENDPOINT,    value: http://minio:9000 }
            - { name: S3_REGION,      value: us-east-1 }
            - { name: S3_BUCKET,      value: storm-media }
            - { name: S3_ACCESS_KEY,  value: minio }
            - { name: S3_SECRET_KEY,  value: minio12345 }
