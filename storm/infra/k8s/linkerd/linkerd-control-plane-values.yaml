# Helm values for linkerd-control-plane.
# Assumes the linkerd-crds chart has been installed first.

clusterDomain: cluster.local

# Identity issuer trust anchor + issuer cert/key are provided out-of-band via
# the linkerd-identity-issuer secret (generated by `step certificate`, see
# INFRA-SETUP.md). The chart consumes them from there.
identity:
  externalCA: false
  issuer:
    scheme: kubernetes.io/tls

proxy:
  resources:
    cpu: { request: 100m, limit: 1 }
    memory: { request: 64Mi, limit: 250Mi }

controllerReplicas: 2

proxyInjector:
  externalSecret: true

profileValidator:
  externalSecret: true

policyValidator:
  externalSecret: true

policyController:
  resources:
    cpu: { request: 100m, limit: 500m }
    memory: { request: 50Mi, limit: 250Mi }
