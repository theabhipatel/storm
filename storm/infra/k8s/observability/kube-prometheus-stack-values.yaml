# Helm values for prometheus-community/kube-prometheus-stack.
# Installs Prometheus, Alertmanager, Grafana, and the operator + CRDs.

fullnameOverride: kube-prom

prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits: { cpu: 2, memory: 4Gi }
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          storageClassName: gp3
          resources:
            requests:
              storage: 50Gi
    additionalScrapeConfigs:
      - job_name: storm-services
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: service

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          storageClassName: gp3
          resources:
            requests:
              storage: 5Gi
  config:
    route:
      receiver: "default"
      group_by: ["alertname", "service"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers: ["severity=page"]
          receiver: "pager"
        - matchers: ["severity=warn"]
          receiver: "default"
    receivers:
      - name: default
        slack_configs:
          - api_url: ${SLACK_DEFAULT_WEBHOOK}
            channel: "#storm-alerts"
      - name: pager
        slack_configs:
          - api_url: ${SLACK_PAGER_WEBHOOK}
            channel: "#storm-oncall"

grafana:
  adminPassword: ${GRAFANA_ADMIN_PASSWORD}
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: true
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.observability.svc.cluster.local:3100
    - name: Tempo
      type: tempo
      access: proxy
      url: http://tempo.observability.svc.cluster.local:3200
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          tags: [{ key: "service.name", value: "service" }]
        tracesToMetrics:
          datasourceUid: prometheus
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: gp3
  podAnnotations:
    linkerd.io/inject: enabled

nodeExporter:
  enabled: true

kube-state-metrics:
  enabled: true
