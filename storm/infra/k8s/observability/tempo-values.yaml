# Helm values for grafana/tempo (single-binary, S3-backed).
tempo:
  retention: 168h
  storage:
    trace:
      backend: s3
      s3:
        bucket: ${TEMPO_S3_BUCKET}
        endpoint: s3.ap-south-1.amazonaws.com
        region: ap-south-1
  metricsGenerator:
    enabled: true
    remoteWriteUrl: http://kube-prom-prometheus.observability.svc.cluster.local:9090/api/v1/write

persistence:
  enabled: true
  size: 20Gi
  storageClassName: gp3

podAnnotations:
  linkerd.io/inject: enabled

serviceMonitor:
  enabled: true
